<!DOCTYPE html>
<html>

<head>

    <title>AI Grievance Routing System</title>

    <style>

        body {
            font-family: Arial;
            background: #f4f4f4;
            padding: 50px;
        }

        .container {
            width: 500px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            cursor: pointer;
        }

        h1 {
            text-align: center;
        }

        h2 {
            color: green;
        }

    </style>

</head>

<body>

    <div class="container">

        <h1>AI Grievance Routing System</h1>

        <form action="/predict" method="POST">

            <textarea
                name="complaint"
                placeholder="Enter complaint here..."
                required>
            </textarea>

            <button type="submit">
                Predict Department
            </button>

        </form>

        <h2>
            {{ prediction_text }}
        </h2>

    </div>

</body>

</html>
